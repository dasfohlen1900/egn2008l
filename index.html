<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL-Datei Generator</title>

<style>
@font-face {
    font-family: 'Aeropus UI II';
    src: url('assets/fonts/AeropusUIII-Regular.otf') format('opentype');
    font-weight: 400;
}

/* ===== Base ===== */

body {
    margin: 0;
    font-family: 'Aeropus UI II', sans-serif;
    background-color: #f7f8fa;
    color: #1e1e1e;
    display: grid;
    grid-template-columns: 1fr 260px;
    height: 100vh;
}

/* ===== Header ===== */

header {
    grid-column: 1 / 3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 22px;
    background: #ffffff;
    border-bottom: 1px solid #e5e5e5;
}

header h1 {
    margin: 0;
    font-size: 1.5rem;
}

/* ===== Burger Icon ===== */

.burger {
    width: 26px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.burger span {
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
}

/* ===== Sidebar ===== */

aside {
    background: #ffffff;
    border-left: 1px solid #e5e5e5;
    padding: 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

aside h3 {
    margin-top: 0;
    font-size: 1rem;
    opacity: .6;
    letter-spacing: .05em;
}

aside a {
    text-decoration: none;
    color: #1e1e1e;
    font-size: 1.05rem;
    padding: 8px 12px;
    border-radius: 10px;
    transition: .2s;
}

aside a:hover {
    background: #eceff3;
}

/* ===== Main ===== */

main {
    padding: 28px;
}

main h2 {
    font-size: 2rem;
    margin-top: 0;
}
</style>
</head>

<body>

<header>
    <p href="index.html?auth=ask">URL-Datei Generator</p>
    <p href="https://aeropus.vercel.app"><b>Zu Aeropus</b></p>
</header>

<main>
    <h2>Willkommen 👋</h2>
    <p>Erstelle, bearbeite und öffne URL-Dateien im .url08-Format.</p>
</main>

<aside>
    <h3>Navigation</h3>
    <a href="auth.html">Anmelden</a>
    <a href="create.html">Neue URL</a>
    <a href="edit.html">Bearbeiten</a>
    <a href="open.html">Öffnen</a>
    <a href="help.html">Hilfe & Wiki</a>
</aside>

</body>
</html>
