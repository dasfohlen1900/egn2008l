<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeropus Cloud - Startseite</title>

<style>
@font-face {
    font-family: 'Aeropus UI II';
    src: url('assets/fonts/AeropusUIII-Regular.otf') format('opentype');
}

:root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --border: #e5e5e5;
    --accent: #4c7cff;
}

body {
    margin: 0;
    font-family: 'Aeropus UI II', sans-serif;
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
    background: var(--bg);
}

header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 1.5rem;
    font-weight: 600;
    z-index: 10;
}

aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
}

.nav-link {
    display: block;
    padding: 8px 12px;
    border-radius: 12px;
    text-decoration: none;
    color: #1e1e1e;
    transition: 0.18s;
}

.nav-link:hover { background: #eef2ff; }
.nav-link.active { background: #e7ecff; color: var(--accent); }

main {
    padding: 32px;
    overflow-y: auto;
}

button {
    padding: 8px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
</head>
<body>

<header>Aeropus Cloud - Startseite</header>

<aside id="cloudSidebar">
    <h3>Navigation</h3>
    <a href="index.html" class="nav-link" data-protected="true">🔒 Zurück zur Startseite</a>
    <a href="create-cloud.html" class="nav-link" data-protected="true">🔒 Cloudlink erstellen</a>
    <a href="edit-cloud.html" class="nav-link" data-protected="true">🔒 Cloudlink bearbeiten</a>
    <a href="open-cloud.html" class="nav-link" data-protected="true">🔒 Cloudlink öffnen</a>
    <a href="#" id="logoutBtn" class="nav-link" style="display:none;">Abmelden</a>
</aside>

<main>
    <h2>Willkommen in der Aeropus Cloud</h2>
    <p>Hier kannst du deine Cloudlinks verwalten, neue Links erstellen und bestehende Links bearbeiten oder öffnen.</p>
    <p id="userStatus"></p>
</main>

<script>
// --- Supabase initialisieren ---
const supabaseUrl = "https://xxbtkhkvqjvzwbkqeivd.supabase.co";
const supabaseKey = "sb_publishable_19q9_9ai2MgoWj5JAuGhnA_HvdVwlan";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// --- Prüfen, ob 12-stellige Benutzerkennung existiert ---
function requireAuth() {
    const userId = localStorage.getItem('user_id');
    if(!userId || !/^\d{12}$/.test(userId)) {
        // Weiterleitung zur Anmeldung
        window.location.href = "auth.html";
    } else {
        updateSidebar(userId);
    }
}

// --- Sidebar Links anzeigen ---
function updateSidebar(userId) {
    const links = document.querySelectorAll('#cloudSidebar .nav-link[data-protected]');
    links.forEach(a => a.style.display = "flex");

    const logoutBtn = document.getElementById("logoutBtn");
    logoutBtn.style.display = "flex";

    document.getElementById("userStatus").textContent = "Angemeldet als Benutzerkennung: " + userId;
}

// --- Logout Funktion ---
document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem('user_id');
    window.location.href = "auth.html";
});

// --- Initial prüfen ---
requireAuth();
</script>

</body>
</html>
