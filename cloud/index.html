<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Cloudfunktionen</title>
  <style>
    @font-face {
      font-family: "Aeropus UI II";
      src: url("/assets/AeropusUIII-Regular.otf") format("opentype");
    }

    /* Grundlayout */
    body {
      font-family: 'Aeropus UI II', Arial, Georgia, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    /* Box für den Inhalt */
    .dashboard-box {
      background-color: white;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.8em;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    /* Button */
    a.button {
      display: inline-block;
      padding: 12px 25px;
      margin-top: 25px;
      font-size: 1em;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background-color: #4CAF50;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="dashboard-box">
    <h1>Kurzlicnks mit Dateien erstellen</h1>
    <p>
      Hey, schön, dass du hier bist! Unsere Cloudfunktionen sind momentan noch nicht aktiv, aber wir arbeiten daran. 
      In der Zwischenzeit kannst du Links in einer <strong>.url08</strong>-Datei erstellen.
    </p>
    <a href="/create.html?" class="button">Erstellen</a>
  </div>
</body>
</html>
